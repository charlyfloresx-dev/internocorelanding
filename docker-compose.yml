services:
  # --- BASE DE DATOS ---
  postgres-db:
    image: postgres:15
    container_name: interno-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dbname
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    networks:
      - interno-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d dbname" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- CACHE & RATE LIMITING (Redis) ---
  redis:
    image: redis:7-alpine
    container_name: interno-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - interno-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- AUTH SERVICE (Identidad y Empresas) ---
  auth-service:
    build:
      context: ./backend
      dockerfile: auth_service/Dockerfile
    container_name: interno-auth-service
    image: interno-auth-service:latest
    ports:
      - "8001:8000"
    volumes:
      - ./backend/auth_service:/app
      - ./backend/common:/app/common
    env_file:
      - .env
    environment:
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/dbname
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/dbname
      - PYTHONPATH=/app
      - HCM_SERVICE_URL=http://hcm-service:8000
      - CORE_HR_RFID_SALT=INTERNO_HR_RFID_SALT_DEV_CHANGE_IN_PROD
      - CORE_REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - interno-network

  # --- HCM SERVICE (Identidad Física y Colaboradores) ---
  hcm-service:
    build:
      context: ./backend
      dockerfile: hcm_service/Dockerfile
    container_name: interno-hcm-service
    image: interno-hcm-service:latest
    ports:
      - "8009:8000"
    volumes:
      - ./backend/hcm_service:/app
      - ./backend/common:/app/common
    env_file:
      - .env
    environment:
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/hcm_db
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/hcm_db
      - PYTHONPATH=/app
      - CORE_HR_RFID_SALT=INTERNO_HR_RFID_SALT_DEV_CHANGE_IN_PROD
      - CORE_REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - interno-network

  # --- MASTER DATA SERVICE (Catálogo y Productos) ---
  master-data-service:
    build:
      context: ./backend
      dockerfile: master_data_service/Dockerfile
    container_name: interno-master-data-service
    image: interno-master-data-service:latest
    ports:
      - "8003:8000"
    volumes:
      - ./backend/master_data_service:/app
      - ./backend/common:/app/common
    environment:
      - CORE_BACKEND_CORS_ORIGINS=${CORE_BACKEND_CORS_ORIGINS}
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/master_data_db
      - CORE_REDIS_URL=redis://redis:6379/0
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/master_data_db
      - PYTHONPATH=/app
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - interno-network

  # --- SUBSCRIPTION SERVICE (Licenciamiento y God Mode) ---
  subscription-service:
    build:
      context: ./backend
      dockerfile: subscription_service/Dockerfile
    container_name: subscription-service-api
    image: interno-backend-subscription-service:latest
    ports:
      - "8002:8000"
    volumes:
      - ./backend/subscription_service:/app
      - ./backend/common:/app/common
    environment:
      - CORE_BACKEND_CORS_ORIGINS=${CORE_BACKEND_CORS_ORIGINS}
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/subscription_db
      - CORE_REDIS_URL=redis://redis:6379/0
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - PYTHONPATH=/app
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - interno-network

  # --- INVENTORY SERVICE (Core de Inventarios y Kardex) ---
  inventory-service:
    build:
      context: ./backend
      dockerfile: inventory_service/Dockerfile
    container_name: interno-inventory-service
    image: interno-inventory-service:latest
    ports:
      - "8006:8000"
    volumes:
      - ./backend/inventory_service:/app
      - ./backend/common:/app/common
      - ./backend/notification_service/notification_app:/app/notification_app
      - ./backend/master_data_service/master_app:/app/master_app
    environment:
      - CORE_BACKEND_CORS_ORIGINS=${CORE_BACKEND_CORS_ORIGINS}
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/inventory_db
      - CORE_REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/inventory_db
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - PYTHONPATH=/app
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - interno-network

  # --- WMS SERVICE (Almacenes y Logística Física) ---  
  wms-service:
    build:
      context: ./backend
      dockerfile: wms_service/Dockerfile
    container_name: wms-service-api
    image: interno-backend-wms-service:latest
    ports:
      - "8007:8000"
    volumes:
      - ./backend/wms_service:/app
      - ./backend/common:/app/common
    environment:
      - CORE_BACKEND_CORS_ORIGINS=${CORE_BACKEND_CORS_ORIGINS}
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/wms_db
      - CORE_REDIS_URL=redis://redis:6379/0
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/wms_db
      - PYTHONPATH=/app
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - interno-network

  # --- TICKETS SERVICE (Incidencias y Soporte) ---
  tickets-service:
    build:
      context: ./backend
      dockerfile: tickets_service/Dockerfile
    container_name: tickets-service-api
    image: interno-backend-tickets-service:latest
    ports:
      - "8004:8000"
    volumes:
      - ./backend/tickets_service:/app/tickets_service
      - ./backend/common:/app/common
    environment:
      - CORE_BACKEND_CORS_ORIGINS=${CORE_BACKEND_CORS_ORIGINS}
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/tickets_db
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/tickets_db
      - CORE_REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - PYTHONPATH=/app:/app/tickets_service
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - interno-network

  # --- TICKETS ESCALATION WORKER (SLA Monitoring) ---
  tickets-escalation-worker:
    build:
      context: ./backend
      dockerfile: tickets_service/Dockerfile
    container_name: tickets-escalation-worker
    image: interno-backend-tickets-service:latest
    restart: always
    command: python scripts/escalation_watcher.py
    volumes:
      - ./backend/tickets_service:/app/tickets_service
      - ./backend/common:/app/common
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/tickets_db
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/tickets_db
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - PYTHONPATH=/app:/app/tickets_service
      - NOTIFICATION_SERVICE_URL=http://notification-service:8000
    depends_on:
      postgres-db:
        condition: service_healthy
      tickets-service:
        condition: service_started
    networks:
      - interno-network

  # --- TICKETS OUTBOX WORKER (Integration Events) ---
  tickets-outbox-worker:
    build:
      context: ./backend
      dockerfile: tickets_service/Dockerfile
    container_name: tickets-outbox-worker
    image: interno-backend-tickets-service:latest
    restart: always
    command: python scripts/outbox_worker.py
    volumes:
      - ./backend/tickets_service:/app/tickets_service
      - ./backend/common:/app/common
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/tickets_db
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/tickets_db
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - PYTHONPATH=/app:/app/tickets_service
      - NOTIFICATION_SERVICE_URL=http://notification-service:8000/api/v1/events
    depends_on:
      postgres-db:
        condition: service_healthy
      tickets-service:
        condition: service_started
    networks:
      - interno-network

  # --- MES SERVICE (Producción y Órdenes) ---
  mes-service:
    build:
      context: ./backend
      dockerfile: mes_service/Dockerfile
    container_name: mes-service-api
    image: interno-backend-mes-service:latest
    ports:
      - "8005:8000"
    volumes:
      - ./backend/mes_service:/app
      - ./backend/common:/app/common
    environment:
      - CORE_BACKEND_CORS_ORIGINS=${CORE_BACKEND_CORS_ORIGINS}
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/mes_db
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/mes_db
      - CORE_REDIS_URL=redis://redis:6379/0
      - POSTGRES_SERVER=postgres-db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mes_db
      - PYTHONPATH=/app:/app/mes_service
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - interno-network

  # --- CURRENCY SERVICE (Tipos de Cambio y Banxico) ---
  currency-service:
    build:
      context: ./backend
      dockerfile: currency_service/Dockerfile
    container_name: currency-service-api
    image: interno-backend-currency-service:latest
    ports:
      - "8008:8000"
    volumes:
      - ./backend/currency_service:/app
      - ./backend/common:/app/common
    environment:
      - CORE_BACKEND_CORS_ORIGINS=${CORE_BACKEND_CORS_ORIGINS}
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/currency_db
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/currency_db
      - CORE_REDIS_URL=redis://redis:6379/0
      - CORE_BANXICO_TOKEN=c0a7ca4f35248b6c0f015c867415f6fbfe87dd05a6385f37c38f1a9253443c00
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - PYTHONPATH=/app
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - interno-network

  # --- NOTIFICATION SERVICE (Emails, Invitaciones y Alertas) ---
  notification-service:
    build:
      context: ./backend
      dockerfile: notification_service/Dockerfile
    container_name: notification-service-api
    image: interno-backend-notification-service:latest
    ports:
      - "8010:8000"
    volumes:
      - ./backend/notification_service:/app
      - ./backend/common:/app/common
    environment:
      - CORE_BACKEND_CORS_ORIGINS=${CORE_BACKEND_CORS_ORIGINS}
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/dbname
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/dbname
      - CORE_REDIS_URL=redis://redis:6379/0
      - RESEND_API_KEY=${CORE_RESEND_API_KEY}
      - CORE_RESEND_API_KEY=${CORE_RESEND_API_KEY}
      - PYTHONPATH=/app
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - interno-network

  # --- FRONTEND ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interno-frontend
    image: interno-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      auth-service:
        condition: service_started
      master-data-service:
        condition: service_started
      wms-service:
        condition: service_started
      currency-service:
        condition: service_started
    networks:
      - interno-network

  # --- VIATRA SERVICE (Travel Mission Control) ---
  viatra-service:
    build:
      context: ./backend
      dockerfile: viatra_service/Dockerfile
    container_name: viatra-service-api
    image: interno-backend-viatra-service:latest
    ports:
      - "8012:8000"

    volumes:
      - ./backend/viatra_service:/app/viatra_service
      - ./backend/common:/app/common

    environment:
      - CORE_BACKEND_CORS_ORIGINS=${CORE_BACKEND_CORS_ORIGINS}
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/viatra_db
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/viatra_db
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - PYTHONPATH=/app:/app/viatra_service
    depends_on:
      auth-service:
        condition: service_started
      postgres-db:
        condition: service_healthy
    networks:
      - interno-network

  # --- ASSET MANAGER SERVICE (CRM Inmobiliario — Distressed Assets) ---
  asset-manager-service:
    build:
      context: ./backend
      dockerfile: asset_manager_service/Dockerfile
    container_name: asset-manager-service-api
    image: interno-backend-asset-manager-service:latest
    ports:
      - "8011:8006"
    volumes:
      - ./backend/asset_manager_service:/app/asset_manager_service
      - ./backend/common:/app/common
    environment:
      - CORE_BACKEND_CORS_ORIGINS=${CORE_BACKEND_CORS_ORIGINS}
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/asset_manager_db
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/asset_manager_db
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - PYTHONPATH=/app:/app/asset_manager_service
      - MASTER_DATA_SERVICE_URL=http://master-data-service:8000
    depends_on:
      postgres-db:
        condition: service_healthy
      master-data-service:
        condition: service_started
    networks:
      - interno-network

  # --- WHATSAPP GATEWAY (Pasarela de WhatsApp Local Multitenant) ---
  whatsapp-gateway:
    build:
      context: ./backend
      dockerfile: whatsapp_gateway/Dockerfile
    container_name: interno-whatsapp-gateway
    image: interno-backend-whatsapp-gateway:latest
    ports:
      - "3011:3000"
    volumes:
      - whatsapp_sessions:/app/sessions
    environment:
      - PORT=3000
      - API_KEY=DEV_INTERNAL_KEY_123
      - SESSIONS_PATH=/app/sessions
    networks:
      - interno-network

networks:
  interno-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  whatsapp_sessions:

