<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interno Core - Notificación</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .header {
            background-color: #000000;
            padding: 30px;
            text-align: center;
        }

        .logo {
            max-width: 180px;
            height: auto;
        }

        .content {
            padding: 40px 30px;
            line-height: 1.6;
        }

        .footer {
            background-color: #f9f9f9;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #888;
            border-top: 1px solid #eee;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #007bff;
            color: white !important;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }

        .legal-links a {
            color: #888;
            margin: 0 10px;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            {% if logo_url %}
            <img src="{{ logo_url }}" alt="Interno Core" class="logo">
            {% else %}
            <h1 style="color: white; margin: 0;">Interno Core</h1>
            {% endif %}
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>&copy; {{ year }} Interno Core. Todos los derechos reservados.</p>
            <div class="legal-links">
                <a href="{{ privacy_policy_url|default('#') }}">Privacidad</a>
                <a href="#">Términos</a>
                <a href="#">Soporte</a>
            </div>
            <p style="margin-top: 15px; font-size: 10px;">Enviado automáticamente por el motor de notificaciones de
                Interno Core.</p>
        </div>
    </div>
</body>

</html>
