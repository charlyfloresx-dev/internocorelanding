version: '3.8'

services:
  # STANDALONE WORKERS
  tickets-unified-worker:
    build:
      context: ../../backend
      dockerfile: docker/Monolith.Dockerfile
    container_name: tickets-unified-worker
    image: interno-monolith:latest
    restart: always
    command: python tickets_service/scripts/unified_worker.py
    volumes:
      - ../../backend:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CORE_DATABASE_URL=${CORE_DATABASE_URL}
      - CORE_SECRET_KEY=${CORE_SECRET_KEY}
      - PYTHONPATH=/app:/app/auth_service:/app/master_data_service:/app/inventory_service:/app/notification_service:/app/tickets_service:/app/mes_service:/app/subscription_service
      - NOTIFICATION_SERVICE_URL=http://interno-gateway-dev:8000/api/v1/events
      - WORKER_POLL_INTERVAL_OUTBOX=5
      - WORKER_POLL_INTERVAL_ESCALATION=60
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - interno-network

networks:
  interno-network:
    external: true
