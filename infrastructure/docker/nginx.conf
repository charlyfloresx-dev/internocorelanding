events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Configuración de compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # DNS dinámico: usa el resolver interno de Docker para re-resolver hostnames
    # cuando un contenedor se reconstruye y obtiene una nueva IP.
    # Sin esto, Nginx cachea el IP al startup y lanza 502 tras un docker rebuild.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 8000;
        server_name localhost;

        # Logs
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # Cabeceras de Proxy estándar
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 para keepalives en upstream; Connection vacío para strip hop-by-hop
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # --- CORS: Delegated to FastAPI CORSMiddleware ---
        # DO NOT add CORS headers here. Each microservice uses FastAPI's CORSMiddleware.
        # Adding them here causes duplicate headers and browser rejection.

        # --- RUTAS DE API ---
        # Nota: proxy_pass usa variables ($svc) para forzar re-resolución DNS en cada petición.
        # Esto es requerido cuando se usa el resolver dinámico en nginx community edition.

        # 1. Autenticación e Identidad
        location /api/v1/auth { set $svc http://auth-service:8000; proxy_pass $svc; }
        location /api/v1/users { set $svc http://auth-service:8000; proxy_pass $svc; }
        location /api/v1/companies { set $svc http://auth-service:8000; proxy_pass $svc; }
        location /api/v1/biometric { set $svc http://auth-service:8000; proxy_pass $svc; }
        location /api/v1/seed { set $svc http://auth-service:8000; proxy_pass $svc; }
        location /api/v1/admin { set $svc http://auth-service:8000; proxy_pass $svc; }
        location /api/v1/health { set $svc http://auth-service:8000; proxy_pass $svc; }

        # 2. Suscripciones y Facturación
        location /api/v1/subscriptions { set $svc http://subscription-service:8000; proxy_pass $svc; }
        location /api/v1/billing { set $svc http://subscription-service:8000; proxy_pass $svc; }
        location /api/v1/wallet { set $svc http://subscription-service:8000; proxy_pass $svc; }

        # 3. Datos Maestros (SSOT)
        location /api/v1/products { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/prices { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/uoms { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/ums { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/categories { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/brands { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/concepts { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/warehouses { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/partners { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/enumerations { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/locations { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/enums { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/gis { set $svc http://master-data-service:8000; proxy_pass $svc; }
        location /api/v1/currencies { set $svc http://master-data-service:8000; proxy_pass $svc; }

        # 4. Inventarios, Kardex y POS
        location /api/v1/inventory { set $svc http://inventory-service:8000; proxy_pass $svc; }
        location /api/v1/search { set $svc http://inventory-service:8000; proxy_pass $svc; }
        location /api/v1/dashboard { set $svc http://inventory-service:8000; proxy_pass $svc; }
        location /api/v1/pos { set $svc http://inventory-service:8000; proxy_pass $svc; }
        location /api/v1/audit { set $svc http://inventory-service:8000; proxy_pass $svc; }
        location /api/v1/customs { set $svc http://inventory-service:8000; proxy_pass $svc; }

        # 5. Tickets y Soporte
        location /api/v1/tickets { set $svc http://tickets-service:8000; proxy_pass $svc; }

        # 7. HCM / HR
        location /api/v1/staff { set $svc http://hcm-service:8000; proxy_pass $svc; }
        location /api/v1/internal/collaborators { set $svc http://hcm-service:8000; proxy_pass $svc; }
        location /api/v1/hcm { set $svc http://hcm-service:8000; proxy_pass $svc; }

        # 8. Notificaciones y WebSockets
        location /api/v1/notifications { set $svc http://notification-service:8000; proxy_pass $svc; }
        location /api/v1/events { set $svc http://notification-service:8000; proxy_pass $svc; }
        location /api/v1/whatsapp { set $svc http://notification-service:8000; proxy_pass $svc; }

        # 9. MES (Manufacturing Execution System)
        location /api/v1/mes { set $svc http://mes-service:8000; proxy_pass $svc; }

        # 10. WMS (Warehouse Management System) — no desplegado en dev
        # location /api/v1/wms { set $svc http://wms-service:8000; proxy_pass $svc; }

        # 11. CMMS (Maintenance) — no desplegado en dev
        # location /api/v1/cmms { set $svc http://cmms-service:8000; proxy_pass $svc; }

        # 12. Asset Management — no desplegado en dev
        # location /api/v1/assets { set $svc http://asset-manager-service:8000; proxy_pass $svc; }

        # 13. Viatra (Tracking & Logistics) — no desplegado en dev
        # location /api/v1/viatra { set $svc http://viatra-service:8000; proxy_pass $svc; }

        # 14. Kiosk / Hardware Interfaces — no desplegado en dev
        # location /api/v1/kiosk { set $svc http://kiosk-service:8000; proxy_pass $svc; }

        # --- WEBSOCKETS ---
        location /ws {
            set $svc http://notification-service:8000;
            proxy_pass $svc;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
        }

        # Health Check del Gateway
        location /health {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:4200' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Company-ID,X-User-ID,X-Admin-Master-Key,X-Trace-Id,X-Transaction-ID,X-Correlation-ID,X-Selection-Token,X-Warehouse-ID,X-Idempotency-Key' always;
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            default_type text/plain;
            return 200 'InternoCore Gateway is UP\n';
        }

        # Root Endpoint (Gateway Ping)
        location / {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:4200' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Company-ID,X-User-ID,X-Admin-Master-Key,X-Trace-Id,X-Transaction-ID,X-Correlation-ID,X-Selection-Token,X-Warehouse-ID,X-Idempotency-Key' always;
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            return 200 'InternoCore API Gateway\n';
        }
    }
}
