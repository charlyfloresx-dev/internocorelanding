events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Configuración de compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Definición de Upstreams (Servidores internos)
    upstream auth_servers {
        server auth-service:8000;
    }

    upstream subscription_servers {
        server subscription-service:8000;
    }

    upstream master_data_servers {
        server master-data-service:8000;
    }

    upstream inventory_servers {
        server inventory-service:8000;
    }

    upstream tickets_servers {
        server tickets-service:8000;
    }

    # upstream wms_servers {
    #     server wms-service:8000;  # NOT deployed in dev environment
    # }

    upstream hcm_servers {
        server hcm-service:8000;
    }

    upstream notification_servers {
        server notification-service:8000;
    }

    server {
        listen 8000;
        server_name localhost;

        # Logs
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # Cabeceras de Proxy estándar
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- RUTAS DE API ---

        # 1. Autenticación e Identidad
        location /api/v1/auth {
            proxy_pass http://auth_servers;
        }

        # 2. Suscripciones y Pagos
        location /api/v1/subscriptions {
            proxy_pass http://subscription_servers;
        }

        # 3. Datos Maestros
        location /api/v1/master-data {
            proxy_pass http://master_data_servers;
        }

        # 4. Inventarios
        location /api/v1/inventory {
            proxy_pass http://inventory_servers;
        }

        # 5. Tickets
        location /api/v1/tickets {
            proxy_pass http://tickets_servers;
        }

        # 6. WMS (disabled in dev - service not running)
        # location /api/v1/wms {
        #     proxy_pass http://wms_servers;
        # }

        # 7. HCM / HR
        location /api/v1/staff {
            proxy_pass http://hcm_servers;
        }
        location /api/v1/internal/collaborators {
            proxy_pass http://hcm_servers;
        }

        # 8. Notifications
        location /api/v1/notifications {
            proxy_pass http://notification_servers;
        }
        location /api/v1/events {
            proxy_pass http://notification_servers;
        }

        # --- WEBSOCKETS ---
        location /ws {
            proxy_pass http://auth_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Health Check del Gateway
        location /health {
            return 200 'InternoCore Gateway is UP\n';
            add_header Content-Type text/plain;
        }
    }
}
