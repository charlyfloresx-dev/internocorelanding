events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Configuración de compresión
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Definición de Upstreams (Servidores internos)
    upstream auth_servers {
        server auth-service:8000;
    }

    upstream subscription_servers {
        server subscription-service:8000;
    }

    upstream master_data_servers {
        server master-data-service:8000;
    }

    upstream inventory_servers {
        server inventory-service:8000;
    }

    upstream tickets_servers {
        server tickets-service:8000;
    }

    upstream hcm_servers {
        server hcm-service:8000;
    }

    upstream notification_servers {
        server notification-service:8000;
    }

    # upstream mes_servers {
    #     server mes-service:8000;
    # }

    # upstream wms_servers {
    #     server wms-service:8000;
    # }

    # upstream cmms_servers {
    #     server cmms-service:8000;
    # }

    # upstream asset_manager_servers {
    #     server asset-manager-service:8000;
    # }

    # upstream viatra_servers {
    #     server viatra-service:8000;
    # }

    # upstream kiosk_servers {
    #     server kiosk-service:8000;
    # }

    server {
        listen 8000;
        server_name localhost;

        # Logs
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # Cabeceras de Proxy estándar
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 para keepalives en upstream; Connection vacío para strip hop-by-hop
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # --- CORS: Delegated to FastAPI CORSMiddleware ---
        # DO NOT add CORS headers here. Each microservice uses FastAPI's CORSMiddleware.
        # Adding them here causes duplicate headers and browser rejection.

        # --- RUTAS DE API ---

        # 1. Autenticación e Identidad
        location /api/v1/auth { proxy_pass http://auth_servers; }
        location /api/v1/users { proxy_pass http://auth_servers; }
        location /api/v1/companies { proxy_pass http://auth_servers; }
        location /api/v1/biometric { proxy_pass http://auth_servers; }
        location /api/v1/seed { proxy_pass http://auth_servers; }
        location /api/v1/admin { proxy_pass http://auth_servers; }
        location /api/v1/health { proxy_pass http://auth_servers; }

        # 2. Suscripciones y Facturación
        location /api/v1/subscriptions { proxy_pass http://subscription_servers; }
        location /api/v1/billing { proxy_pass http://subscription_servers; }
        location /api/v1/wallet { proxy_pass http://subscription_servers; }

        # 3. Datos Maestros (SSOT)
        location /api/v1/products { proxy_pass http://master_data_servers; }
        location /api/v1/prices { proxy_pass http://master_data_servers; }
        location /api/v1/uoms { proxy_pass http://master_data_servers; }
        location /api/v1/ums { proxy_pass http://master_data_servers; }
        location /api/v1/categories { proxy_pass http://master_data_servers; }
        location /api/v1/brands { proxy_pass http://master_data_servers; }
        location /api/v1/concepts { proxy_pass http://master_data_servers; }
        location /api/v1/warehouses { proxy_pass http://master_data_servers; }
        location /api/v1/partners { proxy_pass http://master_data_servers; }
        location /api/v1/enumerations { proxy_pass http://master_data_servers; }
        location /api/v1/locations { proxy_pass http://master_data_servers; }
        location /api/v1/enums { proxy_pass http://master_data_servers; }
        location /api/v1/gis { proxy_pass http://master_data_servers; }
        location /api/v1/currencies { proxy_pass http://master_data_servers; }

        # 4. Inventarios, Kardex y POS
        location /api/v1/inventory { proxy_pass http://inventory_servers; }
        location /api/v1/search { proxy_pass http://inventory_servers; }
        location /api/v1/dashboard { proxy_pass http://inventory_servers; }
        location /api/v1/pos { proxy_pass http://inventory_servers; }
        location /api/v1/audit { proxy_pass http://inventory_servers; }
        location /api/v1/customs { proxy_pass http://inventory_servers; }

        # 5. Tickets y Soporte
        location /api/v1/tickets { proxy_pass http://tickets_servers; }

        # 7. HCM / HR
        location /api/v1/staff { proxy_pass http://hcm_servers; }
        location /api/v1/internal/collaborators { proxy_pass http://hcm_servers; }

        # 8. Notificaciones y WebSockets
        location /api/v1/notifications { proxy_pass http://notification_servers; }
        location /api/v1/events { proxy_pass http://notification_servers; }
        location /api/v1/whatsapp { proxy_pass http://notification_servers; }

        # 9. MES (Manufacturing Execution System)
        # location /api/v1/mes { proxy_pass http://mes_servers; }

        # 10. WMS (Warehouse Management System)
        # location /api/v1/wms { proxy_pass http://wms_servers; }

        # 11. CMMS (Maintenance)
        # location /api/v1/cmms { proxy_pass http://cmms_servers; }

        # 12. Asset Management
        # location /api/v1/assets { proxy_pass http://asset_manager_servers; }

        # 13. Viatra (Tracking & Logistics)
        # location /api/v1/viatra { proxy_pass http://viatra_servers; }

        # 14. Kiosk / Hardware Interfaces
        # location /api/v1/kiosk { proxy_pass http://kiosk_servers; }

        # --- WEBSOCKETS ---
        location /ws {
            proxy_pass http://notification_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
        }

        # Health Check del Gateway
        location /health {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:4200' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Company-ID,X-User-ID,X-Admin-Master-Key,X-Trace-Id,X-Transaction-ID,X-Correlation-ID,X-Selection-Token,X-Warehouse-ID,X-Idempotency-Key' always;
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            default_type text/plain;
            return 200 'InternoCore Gateway is UP\n';
        }

        # Root Endpoint (Gateway Ping)
        location / {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:4200' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Company-ID,X-User-ID,X-Admin-Master-Key,X-Trace-Id,X-Transaction-ID,X-Correlation-ID,X-Selection-Token,X-Warehouse-ID,X-Idempotency-Key' always;
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            return 200 'InternoCore API Gateway\n';
        }
    }
}
