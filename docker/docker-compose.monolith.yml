services:
  postgres-db:
    image: postgres:15
    container_name: interno-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dbname
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - interno-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d dbname" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: interno-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - interno-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  interno-monolith:
    build:
      context: ../backend
      dockerfile: docker/Monolith.Dockerfile
    container_name: interno-monolith
    ports:
      - "8000:8000"
    command: uvicorn main_monolith:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/dbname
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/dbname
      - REDIS_URL=redis://redis:6379/0
      - CORE_REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - CORE_BACKEND_CORS_ORIGINS=["http://localhost:4200","http://localhost:8080"]
      - PYTHONPATH=/app:/app/auth_service:/app/master_data_service:/app/inventory_service:/app/notification_service:/app/tickets_service:/app/mes_service:/app/subscription_service:/app/hcm_service
      - HCM_SERVICE_URL=http://localhost:8000
      - SUBSCRIPTION_SERVICE_URL=http://localhost:8000
      - INT_API_EXTERNAL_URL=http://192.168.1.146:8000
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    networks:
      - interno-network

  tickets-unified-worker:
    build:
      context: ../backend
      dockerfile: docker/Monolith.Dockerfile
    container_name: tickets-unified-worker
    image: interno-monolith:latest
    restart: always
    command: python tickets_service/scripts/unified_worker.py
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/dbname
      - CORE_DATABASE_URL=postgresql+asyncpg://user:password@postgres-db:5432/dbname
      - CORE_REDIS_URL=redis://redis:6379/0
      - CORE_SECRET_KEY=DEV_SECRET_KEY_CAMBIAME_EN_PROD_12345
      - PYTHONPATH=/app:/app/auth_service:/app/master_data_service:/app/inventory_service:/app/notification_service:/app/tickets_service:/app/mes_service
      - NOTIFICATION_SERVICE_URL=http://interno-monolith:8000/api/v1/events
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      interno-monolith:
        condition: service_started
    networks:
      - interno-network

networks:
  interno-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
