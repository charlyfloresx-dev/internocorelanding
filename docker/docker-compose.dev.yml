version: '3.8'

services:
  # ==================================
  # Base de Datos (PostgreSQL - Opción Cloud/Default)
  # ==================================
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_db_dev
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - interno-net
    restart: unless-stopped

  # ==================================
  # Base de Datos (MySQL - Opción On-Prem)
  # Descomentar para probar compatibilidad con MySQL.
  # Asegurarse de comentar el servicio de postgres-db.
  # ==================================
  # mysql-db:
  #   image: mysql:8.0
  #   container_name: mysql_db_dev
  #   environment:
  #     MYSQL_DATABASE: ${DB_NAME}
  #     MYSQL_USER: ${DB_USER}
  #     MYSQL_PASSWORD: ${DB_PASSWORD}
  #     MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} # En dev, podemos usar la misma
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data_dev:/var/lib/mysql
  #   networks:
  #     - interno-net
  #   restart: unless-stopped

  # ==================================
  # Almacenamiento S3-Compatible (MinIO)
  # ==================================
  minio:
    image: minio/minio:latest
    container_name: minio_dev
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    ports:
      - "9000:9000" # API
      - "9001:9001" # Consola
    volumes:
      - minio_data_dev:/data
    networks:
      - interno-net
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # ==================================
  # Servicio de Autenticación
  # ==================================
  auth-service:
    build:
      context: ../backend/auth_service
      dockerfile: ../../docker/Dockerfile.base
    container_name: auth_service_dev
    env_file:
      - ../.env
    volumes:
      - ../backend/auth_service/app:/app/app # Mount auth_service's app to /app/app
      - ../backend/common:/app/common # Mount common to /app/common
    environment:
      PYTHONPATH: /app # Ensure /app is on PYTHONPATH
    ports:
      - "8001:8000"
    depends_on:
      - postgres-db # o mysql-db
    networks:
      - interno-net
    restart: unless-stopped

  # ==================================
  # Servicio WMS (Warehouse Management System)
  # ==================================
  wms-service:
    build:
      context: ../backend/wms_service
      dockerfile: ../../docker/Dockerfile.base
    container_name: wms_service_dev
    env_file:
      - ../.env
    volumes:
      - ../backend/wms_service/app:/app/app
      - ../backend/common:/app/common
    environment:
      PYTHONPATH: /app
    ports:
      - "8002:8000"
    depends_on:
      - postgres-db
      - auth-service
    networks:
      - interno-net
    restart: unless-stopped

# ==================================
# Redes y Volúmenes
# ==================================
networks:
  interno-net:
    driver: bridge

volumes:
  postgres_data_dev:
    driver: local
  # mysql_data_dev:
  #   driver: local
  minio_data_dev:
    driver: local
